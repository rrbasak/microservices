version: '3.8'

services:

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  eureka-server:
    image: debianrajdeep/eureka-server:latest
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"

  restaurant-service:
    image: debianrajdeep/restaurantlisting-server:latest
    container_name: restaurant-service
    restart: unless-stopped
    depends_on:
      - postgres
      - eureka-server
    ports:
      - "9091:9091"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  userinfo-service:
    image: debianrajdeep/userinfo-server:latest
    container_name: userinfo-service
    restart: unless-stopped
    depends_on:
      - postgres
      - eureka-server
    ports:
      - "9092:9092"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  foodcatalogue-service:
    image: debianrajdeep/foodcatalogue-server:latest
    container_name: foodcatalogue-service
    restart: unless-stopped
    depends_on:
      - postgres
      - eureka-server
    ports:
      - "9093:9093"
    environment:
      SPRING_PROFILES_ACTIVE: docker
  order-service:
    image: debianrajdeep/order-server:latest
    container_name: order-service
    restart: unless-stopped
    depends_on:
      - mongodb
      - eureka-server
    ports:
      - "9094:9094"
    environment:
      # SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/orderdb
      # SPRING_DATA_MONGODB_HOST: mongodb
      # SPRING_DATA_MONGODB_PORT: 27017
      # SPRING_DATA_MONGODB_DATABASE: orderdb
      SPRING_DATA_MONGODB_URI: ${MONGO_URI}
      
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"

  api-gateway:
    image: debianrajdeep/api-gateway-server:latest
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - eureka-server
    ports:
      - "9096:9095"
    environment:
      SPRING_PROFILES_ACTIVE: docker
  food-delivery-app-frontend:
    image: debianrajdeep/food-delivery-app:latest
    container_name: food-delivery-app-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "5173:80"

volumes:
  postgres_data:
  mongo_data: